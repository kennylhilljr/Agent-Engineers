<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface Test - AI-68 & AI-70</title>
    <!-- Highlight.js for syntax highlighting (AI-70) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        .card-header {
            padding: 20px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-icon {
            width: 24px;
            height: 24px;
            color: #60a5fa;
        }

        .card-content {
            padding: 20px;
        }

        /* Chat Interface Styles */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
            gap: 16px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.5);
        }

        .chat-welcome {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            text-align: center;
            font-size: 0.95rem;
        }

        .chat-message {
            display: flex;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-message.user {
            justify-content: flex-end;
        }

        .chat-message-content {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 8px;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .chat-message.user .chat-message-content {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            border-bottom-right-radius: 2px;
        }

        .chat-message.ai .chat-message-content {
            background: rgba(148, 163, 184, 0.15);
            color: #e2e8f0;
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .chat-timestamp {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        .chat-input {
            flex: 1;
            padding: 12px 14px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .chat-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.7);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .chat-input::placeholder {
            color: #64748b;
        }

        .chat-send-btn {
            padding: 12px 16px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .chat-send-btn:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transform: translateY(-2px);
        }

        .chat-send-btn:active {
            transform: translateY(0);
        }

        .chat-send-btn svg {
            width: 20px;
            height: 20px;
            stroke-width: 2;
        }

        .chat-loading {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .chat-loading-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #94a3b8;
            animation: bounce 1.4s infinite;
        }

        .chat-loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .chat-loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.8;
            }
            40% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* Code Block Styling (AI-70) */
        .code-block-wrapper {
            margin: 8px 0;
            max-width: 90%;
        }

        .code-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px 6px 0 0;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-bottom: none;
        }

        .code-block-language {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .code-block-filepath {
            font-size: 0.8rem;
            color: #64748b;
            font-family: monospace;
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .copy-button {
            padding: 6px 12px;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .copy-button:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .copy-button.copied {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.3);
        }

        .code-block {
            background: #1e1e1e;
            color: #e0e0e0;
            padding: 12px;
            overflow-x: auto;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 0 0 6px 6px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .code-block pre {
            margin: 0;
            white-space: pre;
        }

        .code-block code {
            display: block;
        }

        /* Syntax Highlighting (Atom One Dark theme via highlight.js) */
        .hljs {
            color: #abb2bf;
        }

        .hljs-string,
        .hljs-attr,
        .hljs-template-variable {
            color: #98c379;
        }

        .hljs-keyword,
        .hljs-selector-tag,
        .hljs-literal,
        .hljs-section,
        .hljs-variable,
        .hljs-name {
            color: #c678dd;
        }

        .hljs-number,
        .hljs-attr {
            color: #d19a66;
        }

        .hljs-title,
        .hljs-type {
            color: #61afef;
        }

        .hljs-function,
        .hljs-method {
            color: #61afef;
        }

        .hljs-comment,
        .hljs-quote {
            color: #5c6370;
            font-style: italic;
        }

        .hljs-tag {
            color: #e06c75;
        }

        .hljs-attr {
            color: #e06c75;
        }

        /* Diff Block Styling */
        .code-block-diff {
            background: #1e1e1e;
        }

        .code-block-diff .code-block {
            background: #1e1e1e;
            border-radius: 0 0 6px 6px;
        }

        .diff-line {
            display: flex;
            padding: 2px 8px;
        }

        .diff-line.added {
            background: rgba(16, 185, 129, 0.15);
            color: #a6e3a1;
        }

        .diff-line.deleted {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .diff-line.neutral {
            background: transparent;
        }

        .diff-indicator {
            display: inline-block;
            width: 20px;
            margin-right: 4px;
            text-align: center;
            color: #64748b;
            font-weight: bold;
            flex-shrink: 0;
        }

        .diff-line.added .diff-indicator {
            color: #10b981;
        }

        .diff-line.deleted .diff-indicator {
            color: #ef4444;
        }

        .diff-content {
            flex: 1;
            white-space: pre;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chat Interface Test</h1>
            <p>AI-68: Conversational Interface - Message Thread</p>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">
                    <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                    </svg>
                    Chat Interface
                </h2>
            </div>
            <div class="card-content">
                <div id="chat-container" class="chat-container">
                    <div id="chat-messages" class="chat-messages">
                        <div class="chat-welcome">
                            <p>Welcome to the Agent Dashboard Chat. Ask me anything about your agent status, metrics, or general questions!</p>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <div class="chat-input-wrapper">
                            <input
                                type="text"
                                id="chat-input"
                                class="chat-input"
                                placeholder="Type a message... (e.g., 'What's my status?')"
                                data-testid="chat-message-input"
                            />
                            <button
                                id="chat-send-btn"
                                class="chat-send-btn"
                                data-testid="chat-send-button"
                                aria-label="Send message"
                            >
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Interface Module (AI-68/AI-70) -->
    <script src="./chat-interface.js"></script>
    <script>
        // Initialize when ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                window.chatInterface = new ChatInterface();
            });
        } else {
            window.chatInterface = new ChatInterface();
        }
    </script>
</body>
</html>
