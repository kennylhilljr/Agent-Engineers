<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface Test - AI-68</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        .card-header {
            padding: 20px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-icon {
            width: 24px;
            height: 24px;
            color: #60a5fa;
        }

        .card-content {
            padding: 20px;
        }

        /* Chat Interface Styles */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
            gap: 16px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.5);
        }

        .chat-welcome {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            text-align: center;
            font-size: 0.95rem;
        }

        .chat-message {
            display: flex;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-message.user {
            justify-content: flex-end;
        }

        .chat-message-content {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 8px;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .chat-message.user .chat-message-content {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            border-bottom-right-radius: 2px;
        }

        .chat-message.ai .chat-message-content {
            background: rgba(148, 163, 184, 0.15);
            color: #e2e8f0;
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .chat-timestamp {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* Provider Selector Styles */
        .provider-selector-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .provider-selector-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
            white-space: nowrap;
        }

        .provider-selector {
            flex: 1;
            padding: 8px 12px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .provider-selector:hover {
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.9);
        }

        .provider-selector:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .provider-selector option {
            background: #1e293b;
            color: #f1f5f9;
            padding: 8px;
        }

        .provider-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .model-selector-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .model-selector-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
            white-space: nowrap;
        }

        .model-selector {
            flex: 1;
            padding: 8px 12px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .model-selector:hover {
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.9);
        }

        .model-selector:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .model-selector option {
            background: #1e293b;
            color: #f1f5f9;
            padding: 8px;
        }

        .model-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        .chat-input {
            flex: 1;
            padding: 12px 14px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .chat-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.7);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .chat-input::placeholder {
            color: #64748b;
        }

        .chat-send-btn {
            padding: 12px 16px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .chat-send-btn:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transform: translateY(-2px);
        }

        .chat-send-btn:active {
            transform: translateY(0);
        }

        .chat-send-btn svg {
            width: 20px;
            height: 20px;
            stroke-width: 2;
        }

        .chat-loading {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .chat-loading-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #94a3b8;
            animation: bounce 1.4s infinite;
        }

        .chat-loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .chat-loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.8;
            }
            40% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* Tool Call Styles */
        .chat-message.tool-call {
            justify-content: center;
        }

        .tool-call-content {
            max-width: 80%;
            padding: 12px 16px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .tool-call-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #60a5fa;
        }

        .tool-call-icon {
            font-size: 1.1rem;
        }

        .tool-call-name {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.85rem;
        }

        .tool-call-input {
            background: rgba(15, 23, 42, 0.5);
            padding: 8px 10px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.8rem;
            color: #cbd5e1;
            white-space: pre-wrap;
            margin-top: 6px;
        }

        /* Tool Result Styles */
        .chat-message.tool-result {
            justify-content: center;
        }

        .tool-result-content {
            max-width: 80%;
            padding: 12px 16px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .tool-result-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4ade80;
        }

        .tool-result-icon {
            font-size: 1.1rem;
        }

        .tool-result-label {
            font-size: 0.85rem;
        }

        .tool-result-output {
            background: rgba(15, 23, 42, 0.5);
            padding: 8px 10px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.8rem;
            color: #cbd5e1;
            white-space: pre-wrap;
            margin-top: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chat Interface Test</h1>
            <p>AI-68: Conversational Interface - Message Thread</p>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">
                    <svg class="card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                    </svg>
                    Chat Interface
                </h2>
            </div>
            <div class="card-content">
                <div id="chat-container" class="chat-container">
                    <div class="provider-selector-container">
                        <label for="ai-provider-selector" class="provider-selector-label">
                            AI Provider:
                        </label>
                        <select
                            id="ai-provider-selector"
                            class="provider-selector"
                            data-testid="ai-provider-selector"
                            aria-label="Select AI Provider"
                        >
                            <option value="claude" data-testid="provider-option-claude">Claude</option>
                            <option value="chatgpt" data-testid="provider-option-chatgpt">ChatGPT</option>
                            <option value="gemini" data-testid="provider-option-gemini">Gemini</option>
                            <option value="groq" data-testid="provider-option-groq">Groq</option>
                            <option value="kimi" data-testid="provider-option-kimi">KIMI</option>
                            <option value="windsurf" data-testid="provider-option-windsurf">Windsurf</option>
                        </select>
                        <span class="provider-badge" id="provider-badge" data-testid="provider-badge">Claude</span>
                    </div>
                    <div class="model-selector-container">
                        <label for="ai-model-selector" class="model-selector-label">
                            Model:
                        </label>
                        <select
                            id="ai-model-selector"
                            class="model-selector"
                            data-testid="ai-model-selector"
                            aria-label="Select AI Model"
                        >
                            <!-- Options will be dynamically populated based on provider -->
                        </select>
                        <span class="model-badge" id="model-badge" data-testid="model-badge">Haiku 4.5</span>
                    </div>
                    <div id="chat-messages" class="chat-messages">
                        <div class="chat-welcome">
                            <p>Welcome to the Agent Dashboard Chat. Ask me anything about your agent status, metrics, or general questions!</p>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <div class="chat-input-wrapper">
                            <input
                                type="text"
                                id="chat-input"
                                class="chat-input"
                                placeholder="Type a message... (e.g., 'What's my status?')"
                                data-testid="chat-message-input"
                            />
                            <button
                                id="chat-send-btn"
                                class="chat-send-btn"
                                data-testid="chat-send-button"
                                aria-label="Send message"
                            >
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class ChatInterface {
            constructor() {
                this.messagesContainer = document.getElementById('chat-messages');
                this.input = document.getElementById('chat-input');
                this.sendBtn = document.getElementById('chat-send-btn');
                this.providerSelector = document.getElementById('ai-provider-selector');
                this.providerBadge = document.getElementById('provider-badge');
                this.modelSelector = document.getElementById('ai-model-selector');
                this.modelBadge = document.getElementById('model-badge');
                this.messages = [];
                this.selectedProvider = 'claude';
                this.selectedModel = 'haiku-4.5';

                // Provider-Model mapping
                this.providerModels = {
                    'claude': [
                        { id: 'haiku-4.5', name: 'Haiku 4.5', isDefault: true },
                        { id: 'sonnet-4.5', name: 'Sonnet 4.5', isDefault: false },
                        { id: 'opus-4.6', name: 'Opus 4.6', isDefault: false }
                    ],
                    'chatgpt': [
                        { id: 'gpt-4o', name: 'GPT-4o', isDefault: true },
                        { id: 'o1', name: 'o1', isDefault: false },
                        { id: 'o3-mini', name: 'o3-mini', isDefault: false },
                        { id: 'o4-mini', name: 'o4-mini', isDefault: false }
                    ],
                    'gemini': [
                        { id: '2.5-flash', name: '2.5 Flash', isDefault: true },
                        { id: '2.5-pro', name: '2.5 Pro', isDefault: false },
                        { id: '2.0-flash', name: '2.0 Flash', isDefault: false }
                    ],
                    'groq': [
                        { id: 'llama-3.3-70b', name: 'Llama 3.3 70B', isDefault: true },
                        { id: 'mixtral-8x7b', name: 'Mixtral 8x7B', isDefault: false }
                    ],
                    'kimi': [
                        { id: 'moonshot', name: 'Moonshot', isDefault: true }
                    ],
                    'windsurf': [
                        { id: 'cascade', name: 'Cascade', isDefault: true }
                    ]
                };

                this.init();
            }

            init() {
                if (!this.input || !this.sendBtn) {
                    console.warn('Chat interface elements not found');
                    return;
                }

                // Load saved provider and model from sessionStorage
                this.loadSavedProvider();
                this.loadSavedModel();

                // Populate model dropdown for current provider
                this.updateModelDropdown(this.selectedProvider);

                // Set up event listeners
                this.sendBtn.addEventListener('click', () => this.sendMessage());
                this.input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });

                if (this.providerSelector) {
                    this.providerSelector.addEventListener('change', (e) => this.handleProviderChange(e));
                }

                if (this.modelSelector) {
                    this.modelSelector.addEventListener('change', (e) => this.handleModelChange(e));
                }
            }

            loadSavedProvider() {
                try {
                    const savedProvider = sessionStorage.getItem('selectedAIProvider');
                    if (savedProvider) {
                        this.selectedProvider = savedProvider;
                        if (this.providerSelector) {
                            this.providerSelector.value = savedProvider;
                        }
                        this.updateProviderBadge(savedProvider);
                    } else {
                        // Default is Claude
                        this.updateProviderBadge('claude');
                    }
                } catch (error) {
                    console.warn('Could not load saved provider:', error);
                }
            }

            handleProviderChange(event) {
                const newProvider = event.target.value;
                this.selectedProvider = newProvider;

                // Save to sessionStorage
                try {
                    sessionStorage.setItem('selectedAIProvider', newProvider);
                } catch (error) {
                    console.warn('Could not save provider to sessionStorage:', error);
                }

                // Update badge
                this.updateProviderBadge(newProvider);

                // Update model dropdown for new provider
                this.updateModelDropdown(newProvider);

                // Set default model for new provider
                const defaultModel = this.getDefaultModel(newProvider);
                this.selectedModel = defaultModel;
                this.modelSelector.value = defaultModel;
                this.updateModelBadge(defaultModel);

                // Save model to sessionStorage
                try {
                    sessionStorage.setItem('selectedAIModel', defaultModel);
                } catch (error) {
                    console.warn('Could not save model to sessionStorage:', error);
                }

                console.log(`Provider switched to: ${newProvider}, Model: ${defaultModel}`);
            }

            handleModelChange(event) {
                const newModel = event.target.value;
                this.selectedModel = newModel;

                // Save to sessionStorage
                try {
                    sessionStorage.setItem('selectedAIModel', newModel);
                } catch (error) {
                    console.warn('Could not save model to sessionStorage:', error);
                }

                // Update badge
                this.updateModelBadge(newModel);

                console.log(`Model switched to: ${newModel}`);
            }

            updateProviderBadge(provider) {
                if (!this.providerBadge) return;

                const providerNames = {
                    'claude': 'Claude',
                    'chatgpt': 'ChatGPT',
                    'gemini': 'Gemini',
                    'groq': 'Groq',
                    'kimi': 'KIMI',
                    'windsurf': 'Windsurf'
                };

                this.providerBadge.textContent = providerNames[provider] || provider;
            }

            updateModelBadge(modelId) {
                if (!this.modelBadge) return;

                // Find model name from current provider's models
                const models = this.providerModels[this.selectedProvider] || [];
                const model = models.find(m => m.id === modelId);

                if (model) {
                    this.modelBadge.textContent = model.name;
                } else {
                    this.modelBadge.textContent = modelId;
                }
            }

            updateModelDropdown(provider) {
                if (!this.modelSelector) return;

                const models = this.providerModels[provider] || [];

                // Clear existing options
                this.modelSelector.innerHTML = '';

                // Populate with models for this provider
                models.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.name;
                    option.setAttribute('data-testid', `model-option-${model.id}`);
                    if (model.isDefault) {
                        option.setAttribute('data-default', 'true');
                    }
                    this.modelSelector.appendChild(option);
                });
            }

            getDefaultModel(provider) {
                const models = this.providerModels[provider] || [];
                const defaultModel = models.find(m => m.isDefault);
                return defaultModel ? defaultModel.id : (models[0] ? models[0].id : null);
            }

            loadSavedModel() {
                try {
                    const savedModel = sessionStorage.getItem('selectedAIModel');
                    if (savedModel) {
                        // Verify model is valid for current provider
                        const models = this.providerModels[this.selectedProvider] || [];
                        const modelExists = models.find(m => m.id === savedModel);

                        if (modelExists) {
                            this.selectedModel = savedModel;
                            if (this.modelSelector) {
                                this.modelSelector.value = savedModel;
                            }
                            this.updateModelBadge(savedModel);
                        } else {
                            // Use default model if saved model not valid for current provider
                            const defaultModel = this.getDefaultModel(this.selectedProvider);
                            this.selectedModel = defaultModel;
                            this.updateModelBadge(defaultModel);
                        }
                    } else {
                        // No saved model, use default
                        const defaultModel = this.getDefaultModel(this.selectedProvider);
                        this.selectedModel = defaultModel;
                        this.updateModelBadge(defaultModel);
                    }
                } catch (error) {
                    console.warn('Could not load saved model:', error);
                }
            }

            getSelectedProvider() {
                return this.selectedProvider;
            }

            getSelectedModel() {
                return this.selectedModel;
            }

            getProviderModels(provider) {
                return this.providerModels[provider] || [];
            }

            async sendMessage() {
                const text = this.input.value.trim();
                if (!text) return;

                const provider = this.selectedProvider;
                const model = this.selectedModel;
                this.addMessage(text, 'user', provider, model);
                this.input.value = '';
                this.showLoadingIndicator();

                // Try to use streaming API, fall back to mock if not available
                try {
                    await this.sendStreamingMessage(text, provider, model);
                } catch (error) {
                    console.error('Streaming error, falling back to mock:', error);
                    // Fall back to mock response
                    setTimeout(() => {
                        this.removeLoadingIndicator();
                        this.addMessage(this.generateAIResponse(text, provider, model), 'ai', provider, model);
                    }, 800);
                }
            }

            async sendStreamingMessage(text, provider, model) {
                const response = await fetch('http://localhost:8420/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: text,
                        provider: provider,
                        model: model
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Check if response is streaming (SSE)
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('text/event-stream')) {
                    // Handle streaming response
                    await this.handleStreamingResponse(response, provider, model);
                } else {
                    // Handle non-streaming JSON response (fallback)
                    const data = await response.json();
                    this.removeLoadingIndicator();
                    this.addMessage(data.response || 'No response', 'ai', provider, model);
                }
            }

            async handleStreamingResponse(response, provider, model) {
                this.removeLoadingIndicator();

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let currentMessage = '';
                let messageElement = null;
                let toolCalls = [];

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));

                            if (data.type === 'text') {
                                // Append text to current message
                                currentMessage += data.content;

                                if (!messageElement) {
                                    // Create message element
                                    messageElement = this.createStreamingMessageElement(provider, model);
                                    this.messagesContainer.appendChild(messageElement);
                                }

                                // Update content
                                const contentEl = messageElement.querySelector('.chat-message-content');
                                contentEl.textContent = currentMessage;
                                this.scrollToBottom();

                            } else if (data.type === 'tool_use') {
                                // Show tool use
                                toolCalls.push(data);
                                this.showToolCall(data);

                            } else if (data.type === 'tool_result') {
                                // Show tool result
                                this.showToolResult(data);

                            } else if (data.type === 'done') {
                                // Message complete
                                this.messages.push({
                                    id: Date.now(),
                                    text: currentMessage,
                                    sender: 'ai',
                                    provider: provider,
                                    model: model,
                                    timestamp: new Date(),
                                    toolCalls: toolCalls
                                });
                                break;

                            } else if (data.type === 'error') {
                                // Show error
                                this.removeLoadingIndicator();
                                this.addMessage(`Error: ${data.content}`, 'ai', provider, model);
                            }
                        }
                    }
                }
            }

            createStreamingMessageElement(provider, model) {
                const welcome = this.messagesContainer.querySelector('.chat-welcome');
                if (welcome) {
                    welcome.remove();
                }

                const div = document.createElement('div');
                div.className = 'chat-message ai';
                div.setAttribute('data-testid', 'chat-message-ai');

                const timeStr = new Date().toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                div.innerHTML = `
                    <div>
                        <div class="chat-message-content"></div>
                        <div class="chat-timestamp">${timeStr}</div>
                    </div>
                `;

                return div;
            }

            showToolCall(toolData) {
                const div = document.createElement('div');
                div.className = 'chat-message tool-call';
                div.setAttribute('data-testid', 'tool-call-message');
                div.setAttribute('data-tool-id', toolData.tool_id);

                const timeStr = new Date().toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                div.innerHTML = `
                    <div class="tool-call-content">
                        <div class="tool-call-header">
                            <span class="tool-call-icon">🔧</span>
                            <span class="tool-call-name">${this.escapeHtml(toolData.tool_name)}</span>
                        </div>
                        <div class="tool-call-input">${this.escapeHtml(JSON.stringify(toolData.tool_input, null, 2))}</div>
                        <div class="chat-timestamp">${timeStr}</div>
                    </div>
                `;

                this.messagesContainer.appendChild(div);
                this.scrollToBottom();
            }

            showToolResult(resultData) {
                const div = document.createElement('div');
                div.className = 'chat-message tool-result';
                div.setAttribute('data-testid', 'tool-result-message');
                div.setAttribute('data-tool-id', resultData.tool_id);

                const timeStr = new Date().toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                div.innerHTML = `
                    <div class="tool-result-content">
                        <div class="tool-result-header">
                            <span class="tool-result-icon">✅</span>
                            <span class="tool-result-label">Tool Result</span>
                        </div>
                        <div class="tool-result-output">${this.escapeHtml(JSON.stringify(resultData.result, null, 2))}</div>
                        <div class="chat-timestamp">${timeStr}</div>
                    </div>
                `;

                this.messagesContainer.appendChild(div);
                this.scrollToBottom();
            }

            addMessage(text, sender, provider = null, model = null) {
                const message = {
                    id: Date.now(),
                    text,
                    sender,
                    provider: provider || this.selectedProvider,
                    model: model || this.selectedModel,
                    timestamp: new Date()
                };

                this.messages.push(message);
                this.renderMessage(message);
                this.scrollToBottom();
            }

            renderMessage(message) {
                const welcome = this.messagesContainer.querySelector('.chat-welcome');
                if (welcome && this.messages.length === 1) {
                    welcome.remove();
                }

                const div = document.createElement('div');
                div.className = `chat-message ${message.sender}`;
                div.setAttribute('data-testid', `chat-message-${message.sender}`);
                div.setAttribute('data-message-id', message.id);

                const content = document.createElement('div');
                const timeStr = message.timestamp.toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                content.innerHTML = `
                    <div class="chat-message-content">${this.escapeHtml(message.text)}</div>
                    <div class="chat-timestamp">${timeStr}</div>
                `;

                div.appendChild(content);
                this.messagesContainer.appendChild(div);
            }

            showLoadingIndicator() {
                const div = document.createElement('div');
                div.className = 'chat-message ai';
                div.id = 'chat-loading';
                div.setAttribute('data-testid', 'chat-loading-indicator');

                div.innerHTML = `
                    <div class="chat-message-content">
                        <div class="chat-loading">
                            <div class="chat-loading-dot"></div>
                            <div class="chat-loading-dot"></div>
                            <div class="chat-loading-dot"></div>
                        </div>
                    </div>
                `;

                this.messagesContainer.appendChild(div);
                this.scrollToBottom();
            }

            removeLoadingIndicator() {
                const loading = document.getElementById('chat-loading');
                if (loading) {
                    loading.remove();
                }
            }

            generateAIResponse(userMessage, provider, model) {
                const lower = userMessage.toLowerCase();
                const providerNames = {
                    'claude': 'Claude',
                    'chatgpt': 'ChatGPT',
                    'gemini': 'Gemini',
                    'groq': 'Groq',
                    'kimi': 'KIMI',
                    'windsurf': 'Windsurf'
                };
                const providerName = providerNames[provider] || provider;

                // Get model name
                const models = this.providerModels[provider] || [];
                const modelObj = models.find(m => m.id === model);
                const modelName = modelObj ? modelObj.name : model;

                if (lower.includes('status') || lower.includes('how')) {
                    return `[${providerName} - ${modelName}] Your agents are running smoothly. All systems are operational with 99.2% uptime.`;
                }
                if (lower.includes('metric') || lower.includes('performance')) {
                    return `[${providerName} - ${modelName}] Current metrics show strong performance: 94% success rate, avg response time 245ms.`;
                }
                if (lower.includes('error') || lower.includes('issue') || lower.includes('problem')) {
                    return `[${providerName} - ${modelName}] No critical errors detected. All monitoring systems are reporting normal status.`;
                }
                if (lower.includes('cost') || lower.includes('usage') || lower.includes('token')) {
                    return `[${providerName} - ${modelName}] Token usage is at 42% of daily allocation. Cost trending 8% below budget.`;
                }
                if (lower.includes('hello') || lower.includes('hi') || lower.includes('hey')) {
                    return `[${providerName} - ${modelName}] Hello! I'm here to help you with any questions about your agent dashboard.`;
                }

                return `[${providerName} - ${modelName}] I understand. Based on your agent dashboard, everything is performing within expected parameters. Is there anything specific you'd like to know?`;
            }

            scrollToBottom() {
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
            }

            escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }

            getMessages() {
                return this.messages;
            }

            clearMessages() {
                this.messages = [];
                this.messagesContainer.innerHTML = `
                    <div class="chat-welcome">
                        <p>Welcome to the Agent Dashboard Chat. Ask me anything about your agent status, metrics, or general questions!</p>
                    </div>
                `;
            }
        }

        // Initialize when ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                window.chatInterface = new ChatInterface();
            });
        } else {
            window.chatInterface = new ChatInterface();
        }
    </script>
</body>
</html>
